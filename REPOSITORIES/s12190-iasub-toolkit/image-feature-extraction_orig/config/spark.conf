########################################
# MASTER
########################################
spark.master=local[64]
# 64 = physical cores (128 vCPU / 2 for hyperthreading)
# RAPIDS GPU tasks are compute-bound, not I/O-bound
# hyperthreading gives no benefit here and adds scheduler overhead

########################################
# GPU MODEL (CORRECT RAPIDS ARCH)
########################################
spark.plugins=com.nvidia.spark.SQLPlugin
spark.rapids.sql.enabled=true
spark.rapids.sql.explain=NONE

########################################
# EXECUTOR / DRIVER (same JVM in local mode)
########################################
spark.driver.memory=900g
# ~56% of 1584GB — leaves ~684GB for:
#   OS + JVM overhead + off-heap + RAPIDS pinned pool + GPU host buffers

spark.driver.maxResultSize=32g

spark.executor.memory=900g
spark.executor.memoryOverhead=64g
# overhead covers off-heap: shuffle buffers, RAPIDS host spill, netty

########################################
# RAPIDS — H100 80GB FULL UTILIZATION
########################################
spark.rapids.sql.concurrentGpuTasks=8
# H100 has massive SM count — 8 concurrent tasks is safe at 70% alloc

spark.rapids.sql.multiThreadedRead.numThreads=64
# match local[64] thread count for read parallelism

spark.rapids.memory.gpu.allocFraction=0.85
# 85% of 80GB = ~68GB reserved for RAPIDS pool
spark.rapids.memory.gpu.maxAllocFraction=0.90
spark.rapids.memory.gpu.minAllocFraction=0.25
spark.rapids.memory.gpu.pooling.enabled=true

spark.rapids.memory.pinnedPool.size=32g
# pinned host memory for fast CPU↔GPU transfers (H100 NVLink bandwidth)

spark.rapids.sql.batchSizeBytes=1g
# H100 HBM3 bandwidth is 3.35 TB/s — large batches fully exploit it

spark.rapids.sql.reader.multithreaded.combine.sizeBytes=512m
spark.rapids.sql.reader.multithreaded.read.keepOrder=false

########################################
# ICEBERG
########################################
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

spark.sql.catalog.lakefs=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakefs.type=hadoop
spark.sql.catalog.lakefs.warehouse=s3a://iceberg/main/warehouse

spark.sql.iceberg.vectorization.enabled=true

########################################
# PARALLELISM
########################################
spark.default.parallelism=128
# 2× physical cores — keeps pipeline full during shuffle
spark.sql.shuffle.partitions=128

spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true
spark.sql.adaptive.coalescePartitions.minPartitionSize=128m
spark.sql.adaptive.advisoryPartitionSizeInBytes=512m
# AQE will collapse small partitions automatically

########################################
# S3A — MAX THROUGHPUT
########################################
spark.hadoop.fs.s3a.aws.credentials.provider=software.amazon.awssdk.auth.credentials.ProfileCredentialsProvider
#spark.hadoop.fs.s3a.auth.profile.name=lakefs
#spark.hadoop.fs.s3a.aws.credentials.provider.profile=lakefs
#spark.hadoop.fs.s3a.aws.credentials.profile.name=lakefs
#spark.hadoop.fs.s3a.aws.profile=lakefs

spark.hadoop.fs.s3a.endpoint=http://localhost:8000
spark.hadoop.fs.s3a.path.style.access=true

spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.AbstractFileSystem.s3a.impl=org.apache.hadoop.fs.s3a.S3A

spark.hadoop.fs.s3a.connection.maximum=256
# max parallel S3 connections
spark.hadoop.fs.s3a.threads.core=64
spark.hadoop.fs.s3a.threads.max=128

spark.hadoop.fs.s3a.connection.timeout=60000
spark.hadoop.fs.s3a.connection.establish.timeout=30000

spark.hadoop.fs.s3a.fast.upload=true
spark.hadoop.fs.s3a.fast.upload.buffer=bytebuffer
# bytebuffer uses direct off-heap memory — avoids JVM GC pressure
spark.hadoop.fs.s3a.fast.upload.active.blocks=8

spark.hadoop.fs.s3a.multipart.size=256m
# larger parts = fewer requests = higher throughput
spark.hadoop.fs.s3a.multipart.threshold=256m

spark.hadoop.fs.s3a.readahead.range=4m
spark.hadoop.fs.s3a.input.fadvise=sequential

########################################
# FILE SPLIT CONTROL
########################################
spark.sql.files.maxPartitionBytes=512m
# larger splits = fewer tasks = less GPU kernel launch overhead
spark.sql.files.openCostInBytes=128m

########################################
# SERIALIZATION
########################################
spark.serializer=org.apache.spark.serializer.KryoSerializer
spark.kryo.registrator=com.nvidia.spark.rapids.GpuKryoRegistrator
spark.kryoSerializer.buffer.max=1g

########################################
# MEMORY MANAGEMENT
########################################
spark.memory.fraction=0.80
# 80% of heap for execution+storage (default 0.6 is conservative)
spark.memory.storageFraction=0.30
# 30% of the above for caching — rest for execution

########################################
# LOCAL SPILL
########################################
spark.local.dir=/home/ghva/NOAA-AUV

########################################
# NETWORK / RPC (local mode still uses RPC internally)
########################################
spark.rpc.message.maxSize=1024
spark.network.timeout=800s
spark.executor.heartbeatInterval=60s

########################################
# LOGGING
########################################
spark.eventLog.enabled=true
spark.eventLog.dir=file:/projetos/ghva/SPARK/spark-events

########################################
# DEPENDENCIES
########################################
spark.jars.packages=org.apache.logging.log4j:log4j-slf4j2-impl:2.25.4,org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.1,org.apache.hadoop:hadoop-aws:3.5.0,software.amazon.awssdk:bundle:2.42.41,com.nvidia:rapids-4-spark_2.13:26.04.0

########################################
# DEBUG
########################################
spark.sql.debug.maxToStringFields=200

spark.sql.execution.pyspark.udf.faulthandler.enabled=true
spark.python.worker.faulthandler.enabled=true

########################################
# JVM / IVY
########################################
spark.driver.extraJavaOptions=-Daws.profile=lakefs -Dlog4j.configurationFile=config/log4j2.properties -Divy.home=/projetos/ghva/SPARK/spark-ivy -Divy.default.ivy.user.dir=/projetos/ghva/SPARK/spark-ivy -Divy.cache.dir=/projetos/ghva/SPARK/spark-ivy/cache -XX:+UseG1GC -XX:G1HeapRegionSize=32m -XX:+UnlockExperimentalVMOptions -XX:G1NewSizePercent=5 -XX:G1MaxNewSizePercent=30 -XX:InitiatingHeapOccupancyPercent=35 -XX:+ParallelRefProcEnabled -XX:ParallelGCThreads=16 -XX:ConcGCThreads=8
spark.executor.extraJavaOptions=-Daws.profile=lakefs -Dlog4j.configurationFile=config/log4j2.properties -Divy.home=/projetos/ghva/SPARK/spark-ivy -Divy.default.ivy.user.dir=/projetos/ghva/SPARK/spark-ivy -Divy.cache.dir=/projetos/ghva/SPARK/spark-ivy/cache -XX:+UseG1GC -XX:G1HeapRegionSize=32m -XX:+UnlockExperimentalVMOptions -XX:G1NewSizePercent=5 -XX:G1MaxNewSizePercent=30 -XX:InitiatingHeapOccupancyPercent=35 -XX:+ParallelRefProcEnabled -XX:ParallelGCThreads=16 -XX:ConcGCThreads=8

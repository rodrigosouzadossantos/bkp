status = error
name = SparkLogConfig

########################################
# FILE APPENDER (rolling by size+date)
########################################
appender.rolling.type = RollingFile
appender.rolling.name = RollingFileAppender
appender.rolling.fileName = SPARK/logs/spark.log
appender.rolling.filePattern = SPARK/logs/spark-%d{yyyyMMdd}-%i.log.gz
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy/MM/dd HH:mm:ss} %-5p %c{1}:%L - %m%n
appender.rolling.policies.type = Policies
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 50MB
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 10

########################################
# CONSOLE APPENDER (warnings only)
########################################
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %-5p %c{1} - %m%n

########################################
# ROOT LOGGER
########################################
rootLogger.level = warn
rootLogger.appenderRefs = rolling, console
rootLogger.appenderRef.rolling.ref = RollingFileAppender
rootLogger.appenderRef.console.ref = ConsoleAppender

########################################
# SPARK SPECIFIC — reduce noise
########################################
logger.spark.name = org.apache.spark
logger.spark.level = warn

logger.rapids.name = com.nvidia.spark
logger.rapids.level = warn

logger.iceberg.name = org.apache.iceberg
logger.iceberg.level = warn

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = warn

########################################
# full debug
########################################
logger.app.name = image-iceberg
logger.app.level = info

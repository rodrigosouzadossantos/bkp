spark.app.name image-iceberg
spark.master local[32]
spark.driver.host 127.0.0.1

spark.plugins com.nvidia.spark.SQLPlugin
spark.rapids.sql.enabled true
spark.rapids.sql.explain NONE

spark.driver.memory 900g
spark.driver.maxResultSize 32g
spark.executor.memory 200g
spark.executor.memoryOverhead 64g

spark.rapids.sql.concurrentGpuTasks 4
spark.rapids.sql.multiThreadedRead.numThreads 32
spark.rapids.memory.gpu.allocFraction 0.40
spark.rapids.memory.gpu.maxAllocFraction 0.60
spark.rapids.memory.gpu.minAllocFraction 0.10
spark.rapids.memory.gpu.pooling.enabled true
spark.rapids.memory.pinnedPool.size 16g
spark.rapids.sql.batchSizeBytes 256m
spark.rapids.sql.reader.multithreaded.combine.sizeBytes 512m
spark.rapids.sql.reader.multithreaded.read.keepOrder false

spark.sql.extensions org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.lakefs org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakefs.type hadoop
spark.sql.catalog.lakefs.warehouse s3a://iceberg/main/warehouse
spark.sql.iceberg.vectorization.enabled true

spark.default.parallelism 128
spark.sql.shuffle.partitions 128
spark.sql.adaptive.enabled true
spark.sql.adaptive.coalescePartitions.enabled true
spark.sql.adaptive.coalescePartitions.minPartitionSize 128m
spark.sql.adaptive.advisoryPartitionSizeInBytes 512m

spark.hadoop.fs.s3a.aws.credentials.provider software.amazon.awssdk.auth.credentials.ProfileCredentialsProvider
spark.hadoop.fs.s3a.endpoint http://localhost:8000
spark.hadoop.fs.s3a.path.style.access true
spark.hadoop.fs.s3a.impl org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.AbstractFileSystem.s3a.impl org.apache.hadoop.fs.s3a.S3A
spark.hadoop.fs.s3a.connection.maximum 256
spark.hadoop.fs.s3a.threads.core 64
spark.hadoop.fs.s3a.threads.max 128
spark.hadoop.fs.s3a.connection.timeout 60000
spark.hadoop.fs.s3a.connection.establish.timeout 30000
spark.hadoop.fs.s3a.fast.upload true
spark.hadoop.fs.s3a.fast.upload.buffer bytebuffer
spark.hadoop.fs.s3a.fast.upload.active.blocks 8
spark.hadoop.fs.s3a.multipart.size 256m
spark.hadoop.fs.s3a.multipart.threshold 256m
spark.hadoop.fs.s3a.readahead.range 4m
spark.hadoop.fs.s3a.input.fadvise sequential

spark.sql.files.maxPartitionBytes 512m
spark.sql.files.openCostInBytes 128m

spark.serializer org.apache.spark.serializer.KryoSerializer
spark.kryo.registrator com.nvidia.spark.rapids.GpuKryoRegistrator
spark.kryoSerializer.buffer.max 1g

spark.memory.fraction 0.80
spark.memory.storageFraction 0.30

spark.rpc.message.maxSize 1024
spark.network.timeout 800s
spark.executor.heartbeatInterval 60s

spark.eventLog.enabled true
spark.eventLog.dir file:///projetos/ghva/PROJECTS/NOAA/NOAA-002/PYTHON/image-iceberg-pipeline/SPARK/events

spark.jars.packages org.apache.logging.log4j:log4j-slf4j2-impl:2.25.4,org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.1,org.apache.hadoop:hadoop-aws:3.5.0,software.amazon.awssdk:bundle:2.42.41,com.nvidia:rapids-4-spark_2.13:26.04.0

spark.sql.debug.maxToStringFields 200
spark.sql.execution.pyspark.udf.faulthandler.enabled true
spark.python.worker.faulthandler.enabled true

spark.driver.extraJavaOptions -Daws.profile=lakefs -Dlog4j.configurationFile=config/log4j2.properties -Divy.home=/projetos/ghva/PROJECTS/NOAA/NOAA-002/PYTHON/image-iceberg-pipeline/SPARK/ivy -Divy.default.ivy.user.dir=/projetos/ghva/PROJECTS/NOAA/NOAA-002/PYTHON/image-iceberg-pipeline/SPARK/ivy -Divy.cache.dir=/projetos/ghva/PROJECTS/NOAA/NOAA-002/PYTHON/image-iceberg-pipeline/SPARK/ivy/cache -XX:+UseG1GC -XX:G1HeapRegionSize=32m -XX:+UnlockExperimentalVMOptions -XX:G1NewSizePercent=5 -XX:G1MaxNewSizePercent=30 -XX:InitiatingHeapOccupancyPercent=35 -XX:+ParallelRefProcEnabled -XX:ParallelGCThreads=16 -XX:ConcGCThreads=8 -XX:+HeapDumpOnOutOfMemoryError
spark.executor.extraJavaOptions -Daws.profile=lakefs -Dlog4j.configurationFile=config/log4j2.properties -Divy.home=/projetos/ghva/PROJECTS/NOAA/NOAA-002/PYTHON/image-iceberg-pipeline/SPARK/ivy -Divy.default.ivy.user.dir=/projetos/ghva/PROJECTS/NOAA/NOAA-002/PYTHON/image-iceberg-pipeline/SPARK/ivy -Divy.cache.dir=/projetos/ghva/PROJECTS/NOAA/NOAA-002/PYTHON/image-iceberg-pipeline/SPARK/ivy/cache -XX:+UseG1GC -XX:G1HeapRegionSize=32m -XX:+UnlockExperimentalVMOptions -XX:G1NewSizePercent=5 -XX:G1MaxNewSizePercent=30 -XX:InitiatingHeapOccupancyPercent=35 -XX:+ParallelRefProcEnabled -XX:ParallelGCThreads=16 -XX:ConcGCThreads=8 -XX:+HeapDumpOnOutOfMemoryError

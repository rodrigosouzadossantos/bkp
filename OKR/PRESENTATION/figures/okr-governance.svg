<svg width="900" height="120" xmlns="http://www.w3.org/2000/svg">

  <rect width="900" height="120" fill="#f8f9fa"/>

  <!-- Estratégia -->
  <rect x="40" y="20" width="220" height="80"
        fill="#cce5ff" stroke="#1f4e79" stroke-width="2"/>
  <text x="60" y="45" font-size="14" font-weight="bold">
    Estratégia
  </text>
  <text x="60" y="70" font-size="12">
    OKR (Wiki / Docs)
  </text>
  <text x="60" y="90" font-size="12">
    Objetivos e KRs
  </text>

  <!-- Gestão -->
  <rect x="340" y="20" width="220" height="80"
        fill="#d4edda" stroke="#1e7e34" stroke-width="2"/>
  <text x="360" y="45" font-size="14" font-weight="bold">
    Gestão
  </text>
  <text x="360" y="70" font-size="12">
    GitHub Project
  </text>
  <text x="360" y="90" font-size="12">
    Fluxo + Métricas
  </text>

  <!-- Execução -->
  <rect x="640" y="20" width="220" height="80"
        fill="#f8d7da" stroke="#721c24" stroke-width="2"/>
  <text x="660" y="45" font-size="14" font-weight="bold">
    Execução
  </text>
  <text x="660" y="70" font-size="12">
    Issues + PRs
  </text>
  <text x="660" y="90" font-size="12">
    Código e Evidência
  </text>

  <!-- Setas -->
  <line x1="260" y1="60" x2="320" y2="60"
        stroke="#333" stroke-width="2"
        marker-end="url(#arrow)"/>
  <line x1="560" y1="60" x2="620" y2="60"
        stroke="#333" stroke-width="2"
        marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10"
            refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>

</svg>

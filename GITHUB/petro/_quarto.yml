project:
  title: ""
  output-dir: docs
format:
  revealjs:
    logo: air.svg
    footer:  'OKR 1 - Rodrigo Souza dos Santos'
    theme: [simple, assets/slides.scss]
    transition: fade
    slide-number: true
    show-slide-number: speaker #all
    navigation-mode: grid
    width: 1280
    height: 720
    chalkboard: true
    #embed-resources: true
    controls: true
    css: [ petrobras.css ]
    header-includes: |
      <link rel="stylesheet" href="assets/fontawesome-free-6.1.1-web/css/fontawesome.min.css">
      <script defer src="assets/fontawesome-free-6.1.1-web/js/all.min.js"></script>
include-after-body:
  text: |
      <script defer src="assets/custom.js"></script>


global:
  workgroup: PETROBRAS
  realm: PETROBRAS.BIZ
  default_user: ghva
  default_password: "As3nhad0pilaco#"
  upload:
    max_concurrent_jobs: 100
    max_smb_workers: 100
    chunk_size: 8388608 # 8MB chunks para upload multipart
    skip_existing: true

    # Configurações de timeout e retry
    timeouts:
      smb_read_seconds: 300        # 5 minutos para ler do SMB
      s3_upload_seconds: 600       # 10 minutos para upload S3
      s3_check_seconds: 30         # 30 segundos para check de existência
      worker_idle_seconds: 60      # 60 segundos sem resposta = worker morto

    retry:
      max_attempts: 3              # Tentar até 3 vezes
      backoff_seconds: 5           # Esperar 5s entre tentativas
      exponential_backoff: true    # 5s, 10s, 20s...
